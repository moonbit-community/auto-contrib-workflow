name: stable-check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MOON_WORKSPACE: modules

jobs:
  check:
    name: MoonBit stable check
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit version
        run: |
          moon version --all

      - name: Update dependencies
        working-directory: ${{ env.MOON_WORKSPACE }}
        run: |
          moon update

      - name: Type check
        working-directory: ${{ env.MOON_WORKSPACE }}
        run: |
          moon check --warn-list +unnecessary_annotation

      - name: Format check
        working-directory: ${{ env.MOON_WORKSPACE }}
        run: |
          moon fmt
          git diff --exit-code -- .

      - name: Public API check
        working-directory: ${{ env.MOON_WORKSPACE }}
        run: |
          moon info
          git diff --exit-code -- .

      - name: Test
        working-directory: ${{ env.MOON_WORKSPACE }}
        run: |
          ulimit -s 8176
          moon test
